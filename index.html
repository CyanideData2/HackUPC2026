<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./playing-cards.min.css" />
    <style>
      pear-ctrl[data-platform="darwin"] {
        margin-top: 12px;
        margin-left: 10px;
      }

      #titlebar {
        -webkit-app-region: drag;
        height: 30px;
        width: 100%;
        position: fixed;
        left: 0;
        top: 0;
        background-color: #b0d94413;
        filter: drop-shadow(2px 10px 6px #888);
      }

      button,
      input {
        all: unset;
        border: 1px ridge #b0d944;
        background: #000;
        color: #b0d944;
        padding: 0.45rem;
        font-family: monospace;
        font-size: 1rem;
        line-height: 1rem;
      }

      body {
        background-color: #001601;
        font-family: monospace;
        margin: 0;
        padding: 0;
      }

      main {
        display: flex;
        height: 100vh;
        width: 100vw;
        color: white;
        justify-content: center;
        margin: 0;
        padding: 0;
      }

      .hidden {
        display: none !important;
      }

      #or {
        margin: 1.5rem auto;
      }

      #setup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #loading {
        align-self: center;
      }

      #header {
        margin-top: 2.2rem;
        margin-bottom: 0.75rem;
      }

      #details {
        display: flex;
        justify-content: space-between;
      }
      #game {
        display:grid;
        grid-template-rows: auto 1fr auto;
      }
      #game-board {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        gap: 0.5rem;
        width: 420px;
        height: 420px;
        margin: 0 auto;
        position: relative;
      }
      .game-board-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60px;
        min-width: 60px;
        font-size: 1rem;
        color: #b0d944;
        background: none;
        border: none;
        text-align: center;
        pointer-events: none;
      }
      .other-player-cell {
        background: #0a2c0a;
        border-radius: 10%;
        border: 2px solid #b0d94499;
        padding: 0.5em 1em;
        min-width: 60px;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px #0008;
      }
      .card-count {
        font-size: 0.9em;
        color: #fff;
        opacity: 0.7;
      }
      .card {
        min-width: 100px;
        min-height: 100px;
      }
    </style>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div id="titlebar">
      <pear-ctrl></pear-ctrl>
    </div>
    <main>
      <div id="setup">
        <div>
          <button id="create-card-room">Create</button>
        </div>
        <div id="or">- or -</div>
        <form id="join-form">
          <button type="submit" id="join-card-room">Join</button>
          <input
            required
            id="join-card-room-id"
            type="text"
            placeholder="Card Lobby Id"
          />
        </form>
      </div>
      <div id="loading" class="hidden">Loading ...</div>
      <div id="game" class="hidden">
        <div id="header">
          <div id="details">
            <div>Peers: <span id="peers-count">0</span></div>
          </div>
        </div>
        <div id="game-board"></div>
        <div id="game-hand"></div>
      </div>
    </main>
  </body>
</html>
